services:
  db:
    image: postgres:17-alpine
    container_name: designbuildsupplydeliveryinstallationtesting-and-commissioni-db
    environment:
      POSTGRES_DB: designbuildsupplydeliveryinstallationtesting-and-commissioni
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: designbuildsupplydeliveryinstallationtesting-and-commissioni-redis
    ports: ["6379:6379"]
    restart: unless-stopped

volumes:
  pgdata: